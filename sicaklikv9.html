<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" id="pwaManifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Termal Takip">
<title>Termal Takip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap');
:root{
  --bg:#080c14;--surface:#0f1624;--panel:#141c2e;--border:#1e2d4a;
  --accent:#00d4ff;--accent2:#0088bb;--yellow:#ffb800;--red:#ff3344;
  --green:#00e676;--text:#c8d8f0;--text-dim:#4a6080;--text-mid:#7a96b8;
  --mono:'JetBrains Mono',monospace;--head:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh;overscroll-behavior:none}
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:rgba(8,12,20,.96);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;backdrop-filter:blur(8px)}
.logo{font-family:var(--head);font-size:19px;font-weight:800;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.logo span{color:var(--text-dim)}
.unit-badge{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:4px;padding:3px 8px;font-family:var(--head);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.page-title{font-family:var(--head);font-size:15px;font-weight:600;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase;display:none}
.back-btn{display:none;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:11px;padding:4px 7px;flex-shrink:0}
.back-btn:hover{background:var(--panel)}
.spacer{flex:1}
.cloud-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background .3s;cursor:pointer}
.cloud-dot.on{background:var(--green)}
.clock{font-size:10px;color:var(--text-dim);white-space:nowrap}
#content{padding:68px 12px 70px;max-width:600px;margin:0 auto}
#bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:60px;background:rgba(8,12,20,.97);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);backdrop-filter:blur(8px)}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text-dim);font-family:var(--mono);font-size:8px;letter-spacing:.4px;transition:color .15s}
.nav-btn svg{width:19px;height:19px}
.nav-btn.active{color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card-head{font-family:var(--head);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-head .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:5px;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.5px;transition:all .15s;text-transform:uppercase}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:#00b8e0}
.btn-ghost{background:transparent;color:var(--text-mid);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,51,68,.3)}
.btn-danger:hover{background:rgba(255,51,68,.1)}
.btn-sm{padding:5px 9px;font-size:10px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.35;cursor:not-allowed}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.form-input,.form-select{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 11px;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-input.temp-input{font-size:26px;font-weight:700;text-align:center;color:var(--accent);letter-spacing:2px;padding:12px}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge-normal{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.badge-yellow{background:rgba(255,184,0,.12);color:var(--yellow);border:1px solid rgba(255,184,0,.25)}
.badge-red{background:rgba(255,51,68,.12);color:var(--red);border:1px solid rgba(255,51,68,.25)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.stat-box{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px 7px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--accent);font-family:var(--head)}
.stat-lbl{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.list-item{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s}
.list-item:hover{border-color:var(--accent)}
.item-name{font-family:var(--head);font-size:15px;font-weight:700;color:var(--text);letter-spacing:.4px;flex:1}
.item-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.meas-row{border:1px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:5px;background:var(--panel);display:flex;align-items:center;gap:9px}
.meas-temp{font-family:var(--head);font-size:20px;font-weight:800;min-width:52px}
.meas-temp.normal{color:var(--green)}
.meas-temp.yellow{color:var(--yellow)}
.meas-temp.red{color:var(--red)}
.meas-meta{flex:1}
.meas-date{font-size:11px;color:var(--text-mid)}
.meas-note{font-size:10px;color:var(--text-dim);margin-top:2px}
.meas-delta{font-size:11px;min-width:38px;text-align:right}
.meas-delta.up{color:var(--red)}
.meas-delta.down{color:var(--green)}
.meas-delta.same{color:var(--text-dim)}
.mini-readings{display:flex;gap:5px;margin-top:8px;overflow-x:auto;padding-bottom:2px}
.mini-dot{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:40px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 3px}
.mini-dot .md-temp{font-size:11px;font-weight:700;font-family:var(--head)}
.mini-dot .md-date{font-size:9px;color:var(--text-dim)}
.alarm-bar{display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:6px;margin-bottom:10px;font-size:12px}
.alarm-normal{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.alarm-yellow{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);color:var(--yellow)}
.alarm-red{background:rgba(255,51,68,.08);border:1px solid rgba(255,51,68,.2);color:var(--red)}
.chart-wrap{height:185px;position:relative;margin:8px 0}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.home-tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:9px}
.home-tile:hover{border-color:var(--accent);background:var(--panel)}
.home-tile.primary{border-color:var(--accent2);background:rgba(0,136,187,.08)}
.home-tile.primary:hover{background:rgba(0,212,255,.12);border-color:var(--accent)}
.home-tile svg{width:28px;height:28px}
.tile-label{font-family:var(--head);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:center;color:var(--text)}
.tile-sub{font-size:9px;color:var(--text-dim);text-align:center}
.note-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.note-chip{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-size:10px;color:var(--text-dim);cursor:pointer;transition:all .12s}
.note-chip:hover{border-color:var(--accent);color:var(--accent)}
.note-chip.sel{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;padding:18px 15px 30px;width:100%;max-width:520px;animation:slideUp .2s ease;max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-family:var(--head);font-size:17px;font-weight:700;color:var(--text);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.modal-actions{display:flex;gap:7px;margin-top:14px}
#setupScreen{display:none;position:fixed;inset:0;z-index:500;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:22px;padding:30px}
#setupScreen.open{display:flex}
.setup-logo{font-family:var(--head);font-size:30px;font-weight:800;color:var(--accent);letter-spacing:4px}
.setup-logo span{color:var(--text-dim)}
.setup-sub{font-size:11px;color:var(--text-dim);text-align:center;line-height:1.8;max-width:300px}
.setup-box{width:100%;max-width:340px}
.filter-bar{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap}
.filter-chip{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-size:11px;color:var(--text-dim);cursor:pointer;transition:all .12s}
.filter-chip.active{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}
.section-div{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin:14px 0 7px;display:flex;align-items:center;gap:7px}
.section-div::after{content:'';flex:1;height:1px;background:var(--border)}
.empty-state{text-align:center;padding:36px 20px;color:var(--text-dim);font-size:12px;line-height:1.8}
.empty-state .es-icon{font-size:36px;margin-bottom:9px}
#toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:9px 16px;font-size:12px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.warn{border-color:var(--yellow);color:var(--yellow)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:360px){.home-grid{grid-template-columns:1fr}}
/* QR SCANNER */
#qrScanner{display:none;position:fixed;inset:0;z-index:400;background:#000;flex-direction:column}
#qrScanner.open{display:flex}
#qrVideo{width:100%;flex:1;object-fit:cover}
#qrCanvas{display:none}
.qr-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.qr-frame{width:220px;height:220px;border:2px solid var(--accent);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,0.65)}
.qr-hint{color:#fff;font-size:12px;margin-top:18px;letter-spacing:1px;text-align:center}
.qr-close-btn{position:absolute;top:48px;right:16px;pointer-events:all;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:5px;padding:7px 14px;font-size:12px;cursor:pointer}
/* UNİTE SEÇİM */
#uniteSecimEkrani{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:24px}
#uniteSecimEkrani.open{display:flex}
.unite-secim-baslik{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--text)}
.unite-secim-alt{font-size:12px;color:var(--text-dim);margin-bottom:24px;text-align:center}
.unite-list{width:100%;max-width:360px;margin-bottom:16px}
.unite-secim-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;text-align:center;color:var(--text)}
.unite-secim-item:active{border-color:var(--accent)}
.unite-secim-yeni{background:transparent;border:1px dashed var(--accent);color:var(--accent)}
/* INSTALL BANNER */
#installBanner{display:none;position:fixed;bottom:72px;left:12px;right:12px;z-index:500;background:#1a2235;border:1px solid var(--accent);border-radius:10px;padding:10px 14px;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
#installBanner span{flex:1;font-size:12px;color:var(--text)}
#installBanner button{font-size:11px;padding:5px 10px;white-space:nowrap}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen">
  <div class="setup-logo">TERMAL<span>TAKİP</span></div>
  <p class="setup-sub">Yeni başlayın veya yedeği geri yükleyin.</p>
  <div class="setup-box">
    <div style="font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Yeni Başlangıç</div>
    <div class="form-group">
      <label class="form-label">Ünite Adı</label>
      <input type="text" class="form-input" id="setupUnitName" placeholder="Örn: 301A, MCC-1, KOMPRESÖR..." maxlength="30" onkeydown="if(event.key==='Enter')doSetup()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doSetup()">Başla →</button>
    <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">VEYA</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <div style="font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Yedekten Devam Et</div>
    <input type="file" accept=".json" id="setupImportFile" style="display:none" onchange="doSetupImport(this)">
    <button class="btn btn-ghost btn-full" onclick="document.getElementById('setupImportFile').click()">&#8593; JSON Yedegi Yukle</button>
    <div id="setupImportStatus" style="font-size:10px;color:var(--text-dim);margin-top:8px;text-align:center;min-height:16px"></div>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <button class="back-btn" id="backBtn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Geri
  </button>
  <div class="logo" id="logoEl">TERMAL<span>TAKİP</span></div>
  <div class="page-title" id="pageTitleEl"></div>
  <div class="spacer"></div>
  <div class="unit-badge" id="unitBadgeEl" title="Aktif unite"></div>
  <button class="btn btn-ghost btn-sm" onclick="uniteSecimGoster()" style="padding:4px 8px;font-size:11px">&#8646; Degistir</button>
  <button class="btn btn-ghost btn-sm" onclick="qrAc()" style="padding:4px 8px;font-size:11px">&#9638; QR</button>
  <div class="cloud-dot" id="cloudDot" onclick="navigate('yedek')" title="Bulut durumu"></div>
  <div class="clock" id="clockEl"></div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- BOTTOM NAV -->
<div id="bottomnav">
  <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ANA
  </button>
  <button class="nav-btn" id="nav-kayit" onclick="navigate('kayit')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    KAYIT
  </button>
  <button class="nav-btn" id="nav-gecmis" onclick="navigate('gecmis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
    GEÇMİŞ
  </button>
  <button class="nav-btn" id="nav-rapor" onclick="navigate('rapor')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="8" y2="17"/><line x1="12" y1="8" x2="12" y2="17"/><line x1="16" y1="14" x2="16" y2="17"/></svg>
    RAPOR
  </button>
  <button class="nav-btn" id="nav-yedek" onclick="navigate('yedek')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"/></svg>
    YEDEK
  </button>
</div>

<!-- UNİTE SEÇİM -->
<div id="uniteSecimEkrani">
  <div class="unite-secim-baslik">Termal Takip</div>
  <div class="unite-secim-alt">Devam etmek icin unite secin</div>
  <div class="unite-list" id="uniteListEl"></div>
  <div id="yeniUniteForm" style="display:none;width:100%;max-width:360px;margin-top:8px">
    <input type="text" class="form-input" id="yeniUniteAdi" placeholder="Unite adi girin... (ornek: 301A)" style="margin-bottom:8px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="yeniUniteFormKapat()">Iptal</button>
      <button class="btn btn-primary" style="flex:2" onclick="yeniUniteKaydet()">Olustur</button>
    </div>
  </div>
</div>

<!-- QR SCANNER -->
<div id="qrScanner">
  <video id="qrVideo" playsinline></video>
  <canvas id="qrCanvas"></canvas>
  <div class="qr-ui">
    <div class="qr-frame"></div>
    <div class="qr-hint">QR kodu cerceve icine getirin</div>
  </div>
  <button class="qr-close-btn" onclick="qrKapat()">X Kapat</button>
</div>

<div id="installBanner">
  <span>&#127777; Ana ekrana eklemek ister misiniz?</span>
  <button class="btn btn-ghost btn-sm" onclick="hideInstallBanner()">Kapat</button>
  <button class="btn btn-primary btn-sm" onclick="showPwaInstall()">Ekle</button>
</div>
<div id="toast"></div>

<script>
const SK = 'termal_v4';
const NOTE_TEMPLATES = [
  'Normal çalışma','Yük arttı','Yük azaldı','Motor değişti',
  'Bakım sonrası','Arıza tespiti','Test ölçümü','Çevre sıcak',
  'Soğutma yetersiz','Yeni motor'
];
const DEVICE_ID = (function(){
  var id = localStorage.getItem('termal_device_id');
  if(!id){ id = 'dev_' + Math.random().toString(36).slice(2) + '_' + Date.now(); localStorage.setItem('termal_device_id', id); }
  return id;
})();

// ─── DATA LAYER ───
function dbLoad(){
  try{ var r = localStorage.getItem(getSK()); if(r) return JSON.parse(r); } catch(e){}
  return { unitName:'', tags:[] };
}
function dbSave(){ localStorage.setItem(getSK(), JSON.stringify(DB)); }
function getSK(){
  var u = localStorage.getItem('termal_son_unite');
  return u ? ('termal_db_' + u) : 'termal_v4';
}
var DB = dbLoad();

function getTag(name){ return DB.tags.find(function(t){ return t.name === name; }); }

function addTag(name, yellow, red, warnDays, amb){
  if(getTag(name)) return false;
  DB.tags.push({ name:name, yellowLimit:parseFloat(yellow)||75, redLimit:parseFloat(red)||80, warnAfterDays:parseInt(warnDays)||0, trackAmbient:!!amb, measurements:[] });
  dbSave(); return true;
}

// DÜZELTİLDİ: trackAmbient parametresi eklendi
function updateTagLimits(name, y, r, w, amb){
  var t = getTag(name); if(!t) return;
  t.yellowLimit = parseFloat(y); t.redLimit = parseFloat(r);
  t.warnAfterDays = (w !== undefined && w !== null && w !== '') ? (parseInt(w)||0) : (t.warnAfterDays||0);
  if(amb !== undefined) t.trackAmbient = !!amb;
  dbSave();
}

function renameTag(oldN, newN){
  if(getTag(newN)) return false;
  var t = getTag(oldN); if(!t) return false;
  t.name = newN; dbSave(); return true;
}
function addMeasurement(tagName, temp, note, ambient){
  var t = getTag(tagName); if(!t) return null;
  var now = new Date();
  var date = now.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.');
  var time = now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  var m = { temp:parseFloat(temp), date:date, time:time, note:note||'', ambient: (ambient!==undefined && ambient!=='' && ambient!==null) ? parseFloat(ambient) : null };
  t.measurements.push(m); dbSave(); return m;
}
function deleteMeas(tagName, idx){
  var t = getTag(tagName); if(t){ t.measurements.splice(idx,1); dbSave(); }
}
function alarmStatus(temp, tag){
  if(temp >= tag.redLimit) return 'red';
  if(temp >= tag.yellowLimit) return 'yellow';
  return 'normal';
}
function lastTemp(tag){ return tag.measurements.length ? tag.measurements[tag.measurements.length-1].temp : null; }
function tempRise(m){ if(m.ambient===null||m.ambient===undefined) return null; return parseFloat((m.temp-m.ambient).toFixed(1)); }
function daysSince(tag){
  if(!tag.measurements.length) return null;
  var last = tag.measurements[tag.measurements.length-1];
  var p = last.date.split('.');
  var lastDate = new Date(p[2],p[1]-1,p[0]);
  var now = new Date(); now.setHours(0,0,0,0); lastDate.setHours(0,0,0,0);
  return Math.floor((now-lastDate)/86400000);
}
function warnDaysLabel(tag){
  if(!tag.warnAfterDays) return '';
  var d = daysSince(tag);
  if(d===null||d<tag.warnAfterDays) return '';
  return d;
}
function calcTrend(ms,n){
  n=n||5; var arr=ms.slice(-n); if(arr.length<2) return null;
  var diff=arr[arr.length-1].temp-arr[0].temp;
  if(Math.abs(diff)<1) return 'stable';
  return diff>0?'rising':'falling';
}
function calcAmbientTrend(tag,n){
  n=n||5;
  var ambMeas=tag.measurements.filter(function(m){ return m.ambient!==null&&m.ambient!==undefined; });
  if(ambMeas.length<2) return null;
  var arr=ambMeas.slice(-n); if(arr.length<2) return null;
  var diff=arr[arr.length-1].ambient-arr[0].ambient;
  if(Math.abs(diff)<0.5) return 'stable';
  return diff>0?'rising':'falling';
}
function ambientTrendLabel(trend){
  if(!trend) return '';
  if(trend==='rising') return '<span style="color:var(--yellow)">↗ Ortam Isiyor</span>';
  if(trend==='falling') return '<span style="color:var(--accent)">↘ Ortam Soguyor</span>';
  return '<span style="color:var(--text-mid)">→ Ortam Stabil</span>';
}
function lastAmbient(tag){
  var ms=tag.measurements.filter(function(m){ return m.ambient!==null&&m.ambient!==undefined; });
  return ms.length?ms[ms.length-1].ambient:null;
}
function trendLabel(trend){
  if(!trend) return '';
  if(trend==='rising') return '<span style="color:var(--red)">&#8593; Isiniyor</span>';
  if(trend==='falling') return '<span style="color:var(--green)">&#8595; Soguyor</span>';
  return '<span style="color:var(--text-mid)">&#8594; Stabil</span>';
}
function parseTRDate(d){ var p=d.split('.'); return new Date(p[2],p[1]-1,p[0]); }
function filterByDate(ms,from,to){
  return ms.filter(function(m){
    var md=parseTRDate(m.date);
    if(from&&md<new Date(from)) return false;
    if(to){ var td=new Date(to); td.setHours(23,59,59); if(md>td) return false; }
    return true;
  });
}

    try{
      var data=snap.val();

      else{
        delete data.lastSync;
        if(data.tags&&!Array.isArray(data.tags)) data.tags=Object.values(data.tags);
        if(!data.tags) data.tags=[];
        data.tags.forEach(function(tag){
          if(tag.measurements&&!Array.isArray(tag.measurements)) tag.measurements=Object.values(tag.measurements);
          if(!tag.measurements) tag.measurements=[];

function doSetupImport(input){
  var file=input.files[0]; if(!file) return;
  var statusEl=document.getElementById('setupImportStatus');
  if(statusEl) statusEl.textContent='Yukleniyor...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var parsed=JSON.parse(e.target.result);
      if(!parsed.tags||!Array.isArray(parsed.tags)){
        if(statusEl){ statusEl.style.color='var(--red)'; statusEl.textContent='Gecersiz yedek dosyasi!'; } return;
      }
      var tc=parsed.tags.length;
      var mc=parsed.tags.reduce(function(s,t){ return s+t.measurements.length; },0);
      DB=parsed; dbSave();
      if(statusEl){ statusEl.style.color='var(--green)'; statusEl.textContent=tc+' tag, '+mc+' olcum yuklendi. Aciliyor...'; }
      setTimeout(function(){ checkSetup(); },800);
    } catch(err){ if(statusEl){ statusEl.style.color='var(--red)'; statusEl.textContent='Dosya okunamadi!'; } }
  };
  reader.readAsText(file);
}

var currentPage='home', currentContext={}, pageStack=[];
function navigate(page,ctx,push){
  if(ctx===undefined) ctx={};
  if(push===undefined) push=true;
  if(push&&currentPage!==page) pageStack.push({page:currentPage,ctx:currentContext});
  currentPage=page; currentContext=ctx;
  setNavActive(page); updateTopBar(page); renderPage(page,ctx);
}
function goBack(){
  if(pageStack.length){ var p=pageStack.pop(); navigate(p.page,p.ctx,false); }
  else navigate('home',{},false);
}

  if(_chart){ _chart.destroy(); _chart=null; }
  Chart.defaults.color='#4a6080'; Chart.defaults.borderColor='#1a2540';
  var labels=tag.measurements.map(function(m){ return m.date.slice(0,5)+' '+m.time; });
  var temps=tag.measurements.map(function(m){ return m.temp; });
  var yellows=temps.map(function(){ return tag.yellowLimit; });
  var reds=temps.map(function(){ return tag.redLimit; });
  var hasAmbData=tag.trackAmbient&&tag.measurements.some(function(m){ return m.ambient!==null&&m.ambient!==undefined; });

    {label:'Motor',data:temps,borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,.07)',tension:.3,pointRadius:3,pointHoverRadius:5,fill:true,borderWidth:2},

function doKaydet(){
  var tagName=document.getElementById('kayitTag')?document.getElementById('kayitTag').value:'';
  var tempVal=document.getElementById('kayitTemp')?document.getElementById('kayitTemp').value:'';
  var note=document.getElementById('kayitNote')?document.getElementById('kayitNote').value:'';
  var ambVal=document.getElementById('kayitAmbient')?document.getElementById('kayitAmbient').value:'';
  var yellowVal=document.getElementById('kayitYellow')?document.getElementById('kayitYellow').value:'';
  var redVal=document.getElementById('kayitRed')?document.getElementById('kayitRed').value:'';
  if(!tagName){ showToast('Tag secin','error'); return; }
  if(!tempVal||isNaN(parseFloat(tempVal))){ showToast('Sicaklik girin','error'); return; }
  var tag=getTag(tagName); if(!tag) return;
  if(yellowVal!==''&&!isNaN(parseFloat(yellowVal))) tag.yellowLimit=parseFloat(yellowVal);
  if(redVal!==''&&!isNaN(parseFloat(redVal))) tag.redLimit=parseFloat(redVal);
  if(ambVal!==''&&!isNaN(parseFloat(ambVal))) tag.ortamSicakligi=parseFloat(ambVal);
  var temp=parseFloat(tempVal);
  var prev=tag.measurements.length?tag.measurements[tag.measurements.length-1].temp:null;
  var delta=prev!==null?temp-prev:null;
  addMeasurement(tagName,temp,note,ambVal);
  var st=alarmStatus(temp,tag);
  var msg='\u2713 '+temp+'\u00b0C kaydedildi';
  if(delta!==null) msg+=' (\u0394'+(delta>0?'+':'')+delta.toFixed(1)+'\u00b0)';
  showToast(msg,st==='red'?'error':st==='yellow'?'warn':'success');
  if(st!=='normal') setTimeout(function(){ showToast(st==='red'?'\u{1F534} KIRMIZI! '+temp+'\u00b0C \u2265 '+tag.redLimit+'\u00b0C':'\u{1F7E1} SARI! '+temp+'\u00b0C \u2265 '+tag.yellowLimit+'\u00b0C',st==='red'?'error':'warn'); },2800);
  navigate('kayit',{tag:tagName},false);
}

function renderGecmis(ctx){
  var fTag=(ctx&&ctx.tag)||'all';
  var fHtml='<div class="filter-chip'+(fTag==='all'?' active':'')+'" onclick="navigate(\'gecmis\',{tag:\'all\'},false)">Tumü</div>';
  DB.tags.forEach(function(t){ fHtml+='<div class="filter-chip'+(fTag===t.name?' active':'')+'" onclick="navigate(\'gecmis\',{tag:\''+t.name+'\'},false)">'+t.name+'</div>'; });
  var rows=[];
  DB.tags.forEach(function(t){
    if(fTag!=='all'&&t.name!==fTag) return;
    t.measurements.slice().reverse().forEach(function(m,ri){
      var origIdx=t.measurements.length-1-ri;
      var prev=origIdx>0?t.measurements[origIdx-1]:null;
      rows.push({tag:t,tagName:t.name,m:m,origIdx:origIdx,delta:prev?m.temp-prev.temp:null});
    });
  });
  var rowsHtml=rows.map(function(r){
    var st=alarmStatus(r.m.temp,r.tag); var dHtml='';
    if(r.delta!==null){ var dc=r.delta>0?'up':r.delta<0?'down':'same'; dHtml='<div class="meas-delta '+dc+'">'+(r.delta>0?'\u2191':r.delta<0?'\u2193':'\u2192')+Math.abs(r.delta).toFixed(1)+'\u00b0</div>'; }
    return '<div class="meas-row"><div class="meas-temp '+st+'">'+r.m.temp+'\u00b0</div>'+
      '<div class="meas-meta"><div class="meas-date"><b>'+r.tagName+'</b> &middot; '+r.m.date+' '+r.m.time+(r.m.ambient!==null&&r.m.ambient!==undefined?' &middot; Ortam:'+r.m.ambient+'&deg;':'')+'</div>'+
      (r.m.note?'<div class="meas-note">'+r.m.note+'</div>':'')+'</div>'+dHtml+
      '<button class="btn btn-sm btn-danger" onclick="confirmDel(\''+r.tagName+'\','+r.origIdx+')">\u2715</button></div>';
  }).join('')||'<div class="empty-state"><div class="es-icon">&#128202;</div>Olcum yok.</div>';
  return '<div class="filter-bar">'+fHtml+'</div>'+rowsHtml;
}

  }).join('')||'<div class="empty-state"><div class="es-icon">&#128200;</div>Olcum yok.</div>';

    (function(){
      var ambTrend2=calcAmbientTrend(tag); var lastAmb2=lastAmbient(tag); var trendBlock='';

        if(tag.trackAmbient){ trendBlock+='<span style="color:var(--border)">|</span><span>Ortam: '+(ambTrend2?ambientTrendLabel(ambTrend2):'<span style="color:var(--text-dim)">Veri yok</span>')+'</span>'; if(lastAmb2!==null) trendBlock+='<span style="color:var(--text-dim)">Son Ortam: '+lastAmb2+'&deg;C</span>'; }

function getRaporData(){
  var selTag=document.getElementById('raporTag')?document.getElementById('raporTag').value:'all';
  var from=document.getElementById('raporFrom')?document.getElementById('raporFrom').value:'';
  var to=document.getElementById('raporTo')?document.getElementById('raporTo').value:'';
  if(selTag==='all'){
    var allTags=DB.tags.map(function(t){ return {tag:t,tagName:t.name,ms:filterByDate(t.measurements,from,to)}; }).filter(function(d){ return d.ms.length>0; });
    if(!allTags.length){ showToast('Secili aralikta veri yok','warn'); return null; }
    return {mode:'all',tags:allTags,totalMeas:allTags.reduce(function(s,d){ return s+d.ms.length; },0)};
  } else {
    var tag=getTag(selTag); if(!tag){ showToast('Tag secin','error'); return null; }
    var ms=filterByDate(tag.measurements,from,to);
    if(!ms.length){ showToast('Secili aralikta veri yok','warn'); return null; }
    return {mode:'single',tag:tag,tagName:selTag,ms:ms,tags:[{tag:tag,tagName:selTag,ms:ms}]};
  }
}

function doExport(){
  var date=new Date().toISOString().slice(0,10);
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=DB.unitName+'_'+date+'.json';a.click();
  showToast(DB.unitName+'_'+date+'.json indirildi','success');
}
function exportTag(tagName){
  var t=getTag(tagName); if(!t) return;
  var date=new Date().toISOString().slice(0,10);
  var data={unitName:DB.unitName,tag:tagName,yellowLimit:t.yellowLimit,redLimit:t.redLimit,measurements:t.measurements};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=DB.unitName+'_'+tagName+'_'+date+'.json';a.click();
  showToast(DB.unitName+'_'+tagName+'_'+date+'.json','success');
}
function doImport(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var parsed=JSON.parse(e.target.result);
      if(!parsed.tags||!Array.isArray(parsed.tags)){ showToast('Gecersiz dosya','error'); return; }
      var tc=parsed.tags.length; var mc=parsed.tags.reduce(function(s,t){ return s+t.measurements.length; },0);
      var encoded=encodeURIComponent(JSON.stringify(parsed));
      showModal('<div class="modal-title">&#9888; Geri Yukleme Onayi</div>'+
        '<p style="color:var(--text-mid);font-size:12px;margin-bottom:8px">Unite: <b>'+(parsed.unitName||'?')+'</b><br>'+tc+' tag, '+mc+' olcum yuklenecek.<br><span style="color:var(--red)">Mevcut veriler silinecek!</span></p>'+
        '<div class="modal-actions"><button class="btn btn-danger" onclick="confirmImport(\''+encoded+'\')">Geri Yukle</button><button class="btn btn-ghost" onclick="closeModal()">Iptal</button></div>');
    } catch(e){ showToast('JSON parse hatasi','error'); }
  };
  reader.readAsText(file);
}
function confirmImport(encoded){
  try{ DB=JSON.parse(decodeURIComponent(encoded)); dbSave(); closeModal(); document.getElementById('unitBadgeEl').textContent=DB.unitName; showToast('Veriler geri yuklendi','success'); navigate('home',{},false); }
  catch(e){ showToast('Yukleme hatasi','error'); }
}

// ─── MODAL ───
function showModal(html){
  var ov=document.getElementById('modalOverlay');
  if(!ov){ ov=document.createElement('div'); ov.className='modal-overlay';ov.id='modalOverlay'; ov.innerHTML='<div class="modal" id="modalBox"></div>'; ov.addEventListener('click',function(e){ if(e.target===ov) closeModal(); }); document.body.appendChild(ov); }
  document.getElementById('modalBox').innerHTML=html;
  ov.classList.add('open');
}
function closeModal(){ var o=document.getElementById('modalOverlay'); if(o) o.classList.remove('open'); }

// ─── TOAST ───
var _toastTimer;
function showToast(msg,type){
  type=type||'success';
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){ t.className=''; },2600);
}

function bindEvents(page,ctx){

}

function tick(){ var el=document.getElementById('clockEl'); if(el) el.textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// ─── QR SCANNER ───
var _qrStream=null,_qrInterval=null,_aktifQrKod='';
function qrAc(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ showToast('Kamera desteklenmiyor','error'); return; }
  document.getElementById('qrScanner').classList.add('open');
  var video=document.getElementById('qrVideo'); var canvas=document.getElementById('qrCanvas');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(stream){
      _qrStream=stream; video.srcObject=stream; video.play();
      _qrInterval=setInterval(function(){
        if(video.readyState!==video.HAVE_ENOUGH_DATA) return;
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        canvas.getContext('2d').drawImage(video,0,0);
        var img=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height);
        var code=jsQR(img.data,img.width,img.height);
        if(code){ qrKapat(); qrSonuc(code.data.trim()); }
      },300);
    })
    .catch(function(){ qrKapat(); showToast('Kamera izni gerekli','error'); });
}
function qrKapat(){
  document.getElementById('qrScanner').classList.remove('open');
  if(_qrInterval){ clearInterval(_qrInterval);_qrInterval=null; }
  if(_qrStream){ _qrStream.getTracks().forEach(function(t){ t.stop(); });_qrStream=null; }
}
function qrSonuc(qrKod){
  var tag=getTag(qrKod);
  if(tag){ navigate('tag_detail',{tag:qrKod}); showToast('Acildi: '+qrKod,'success'); }
  else{
    _aktifQrKod=qrKod;
    showModal('<div class="modal-title">Yeni Tag</div>'+
      '<div style="font-size:10px;color:var(--text-dim);margin-bottom:12px">QR: '+qrKod+'</div>'+
      '<div class="form-group"><label class="form-label">Tag Adi *</label><input type="text" class="form-input" id="qrTagAdi" placeholder="ornek: Zone 1 A1"></div>'+
      '<div class="form-group"><label class="form-label">Sari Limit (C)</label><input type="number" class="form-input" id="qrSari" value="75"></div>'+
      '<div class="form-group"><label class="form-label">Kirmizi Limit (C)</label><input type="number" class="form-input" id="qrKirmizi" value="85"></div>'+
      '<div class="form-group"><label class="form-label">Olcum Periyodu (gun)</label><input type="number" class="form-input" id="qrPeriyot" value="7"></div>'+
      '<div class="form-group"><label class="form-label">Ortam Sicakligi (C)</label><input type="number" class="form-input" id="qrOrtam" placeholder="25"></div>'+
      '<div class="modal-actions"><button class="btn btn-primary" onclick="qrKaydet()">Kaydet</button><button class="btn btn-ghost" onclick="closeModal()">Iptal</button></div>');
    setTimeout(function(){ var el=document.getElementById('qrTagAdi'); if(el) el.focus(); },200);
  }
}
function qrKaydet(){
  var ad=document.getElementById('qrTagAdi').value.trim();
  var sari=parseFloat(document.getElementById('qrSari').value)||75;
  var kirmizi=parseFloat(document.getElementById('qrKirmizi').value)||85;
  var periyot=parseFloat(document.getElementById('qrPeriyot').value)||7;
  var ortam=parseFloat(document.getElementById('qrOrtam').value)||0;
  if(!ad){ showToast('Tag adi zorunlu','error'); return; }
  addTag(ad,sari,kirmizi,periyot,true);
  var tag=getTag(ad); if(tag){ tag.ortamSicakligi=ortam; dbSave(); }
  closeModal(); navigate('tag_detail',{tag:ad}); showToast('Olusturuldu: '+ad,'success');
}
